[build]
builder = "nixpacks"
buildCommand = "cd frontend && npm install && npm run build && cd ../backend && npm install && npx prisma generate --schema=src/db/schema.prisma"

[deploy]
startCommand = "cd backend && npx prisma db push --schema=src/db/schema.prisma && node src/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
